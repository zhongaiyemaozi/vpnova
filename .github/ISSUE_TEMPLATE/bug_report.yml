name: 问题反馈
description: 反馈安装、启动、导入、VPN 连接或界面问题
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈 VPNova 问题。提交前请删除日志、截图、订阅链接、二维码或节点信息中的所有敏感内容。
  - type: input
    id: app_version
    attributes:
      label: VPNova 版本
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: ios_version
    attributes:
      label: iOS/iPadOS 版本
      placeholder: "iOS 18.5"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: 设备型号
      placeholder: "iPhone 15 Pro、iPad mini 6 等"
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: 安装方式
      options:
        - AltStore
        - Sideloadly
        - Xcode
        - Apple Configurator
        - 企业签名
        - 其他
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 问题类型
      options:
        - 安装
        - App 启动
        - VPN 连接
        - 节点导入
        - 订阅导入
        - 规则
        - DNS
        - 流量统计
        - UI
        - 其他
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 发生了什么？
      description: 请清楚描述问题。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 VPNova
        2. 点击 ...
        3. 出现 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期表现
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可以粘贴已脱敏日志或上传截图。请删除 token、密码、私钥、节点地址和服务器凭据。
    validations:
      required: false
